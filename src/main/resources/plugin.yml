name: ApexStaff
version: '1.5'
main: me.smegasberla.apexStaff.ApexStaff
paper-plugin-loader: me.smegasberla.apexStaff.ApexStaffLoader
api-version: '1.21'
prefix: ApexStaff
authors: [ smegasberla ]
description: High performance utilities and QoL features for server staff.
softdepend:
  - PlaceholderAPI


commands:
  apexstaff:
    description: Main ApexStaff command
    usage: /<command> [vanish|reload|xray]
    aliases: ax
    permission: apexstaff.admin

permissions:
  apexstaff.*:
    description: Access all ApexStaff commands
    default: op
    children:
      apexstaff.admin: true
      apexstaff.reload: true
      apexstaff.vanish: true
      apexstaff.freeze: true
      apexstaff.exempt: false
      apexstaff.fly: true
      apexstaff.xray: true
      apexstaff.clearchat: true
      apexstaff.dupeip: true
      apexstaff.ping: true
      apexstaff.shadowcam: true
      apexstaff.notes: true
      apexstaff.staffchat: true
      apexstaff.exstension: true
      apexstaff.status: true

  apexstaff.admin:
    description: Access ApexStaff main command
    default: op
  apexstaff.reload:
    description: Access /apexstaff reload command
    default: op
  apexstaff.vanish:
    description: Access /apexstaff vanish {player} command
    default: op
  apexstaff.freeze:
    description: Access /apexstaff freeze {player} command
    default: op
  apexstaff.exempt:
    description: Exempts the owner from plugin cheats checks
    default: false
  apexstaff.xray:
    description: Access /apexstaff xray {player} [info|clear] command
    default: op
  apexstaff.fly:
    description: Access /apexstaff fly {player} command
    default: op
  apexstaff.clearchat:
    description: Access /apexstaff clearchat {player} command
    default: op
  apexstaff.dupeip:
    description: Access /apexstaff dupeip {player} command
    default: op
  apexstaff.ping:
    description: Access /apexstaff ping {player} command
    default: op
  apexstaff.shadowcam:
    description: Access /apexstaff shadowcam {player} command
    default: op
  apexstaff.notes:
    description: Access /apexstaff notes {player} command
    default: op
  apexstaff.staffchat:
    description: Access /apexstaff staffchat command
    default: op
  apexstaff.exstension:
    description: Access /apexstaff exstension command
    default: op
  apexstaff.status:
    description: Access /apexstaff status {player} command
    default: op