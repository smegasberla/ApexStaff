name: ApexStaff
version: '1.0'
main: me.smegasberla.apexStaff.ApexStaff
api-version: '1.21'
prefix: ApexStaff
authors: [ smegasberla ]
description: High performance utilities and QoL features for server staff.
commands:
  apexstaff:
    description: Main ApexStaff command
    usage: /<command> [vanish|reload|xray]
    aliases: ax
    permission: apexstaff.admin

permissions:
  apexstaff.*:
    description: Access all ApexStaff commands
    default: op
    children:
      apexstaff.admin: true
      apexstaff.reload: true
      apexstaff.vanish: true
      apexstaff.freeze: true
      apexstaff.exempt: false
      apexstaff.fly: true
      apexstaff.xray: true
      apexstaff.clearchat: true
      apexstaff.dupeip: true

  apexstaff.admin:
    description: Access ApexStaff main command
    default: op
  apexstaff.reload:
    description: Access /apexstaff reload command
    default: op
  apexstaff.vanish:
    description: Access /apexstaff vanish {player} command
    default: op
  apexstaff.freeze:
    description: Access /apexstaff freeze {player} command
    default: op
  apexstaff.exempt:
    description: Exempts the owner from plugin cheats checks
    default: false
  apexstaff.xray:
    description: Access /apexstaff xray {player} [info|clear] command
    default: op
  apexstaff.fly:
    description: Access /apexstaff fly {player} command
    default: op
  apexstaff.clearchat:
    description: Access /apexstaff clearchat {player} command
    default: op
  apexstaff.dupeip:
    description: Access /apexstaff dupeip {player} command
    default: op