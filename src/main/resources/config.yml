#OPTIONS:
freeze:
  # Block a player to write messages in chat while freezed
  block-chat-message: true

  # Block a player to execute commands while freezed
  block-command-execution: true

  # Ban a player when he quits the server when was freezed
  ban-on-quit:
    enabled: true
    reason: "Quitted while freezed"
    temp-ban:
      # Overrides the permanent ban feature
      enabled: true

      #Time for the temp ban when quitting after getting freezed
      time: "1h"

  # Block a player to take/deal damage while freezed
  block-damage: true

  whitelisted-commands:
    - msg
    - whitelist
    #Continue writing commands here

xray:
  #Set it to false if you wanna disable x-ray check. Don't auto-ban people if they get flagged as suspect, always check first.
  enabled: true

  #List of blocks that the plugin will take count of when checking for xray(The names are the material names for minecraft<)
  xray-blocks:
    # Diamond
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    # Gold
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - NETHER_GOLD_ORE
    # Iron
    - IRON_ORE
    - DEEPSLATE_IRON_ORE
    # Emerald
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
    # Coal
    - COAL_ORE
    - DEEPSLATE_COAL_ORE
    # Copper
    - COPPER_ORE
    - DEEPSLATE_COPPER_ORE
    # Lapis Lazuli
    - LAPIS_ORE
    - DEEPSLATE_LAPIS_ORE
    # Redstone
    - REDSTONE_ORE
    - DEEPSLATE_REDSTONE_ORE
    # Nether Specific
    - ANCIENT_DEBRIS
    - NETHER_QUARTZ_ORE

  #Follow using same syntax if you wanna add more blocks

  #Percentage number from when a player starts to be suspect and level of risk is moderate, below this is low risk
  alert-threshold: 40.0
  #From here the player gets flagged  as high risk of x-ray
  high-risk: 70.0
  #Amount of mining blocks to break before getting flagged as suspect if the percentage is higher than alert-threshold
  amount-of-blocks: 100
  #Choose if to enable automatic alert for xray, if set to false the interval option won't work
  automatic-alert: true
  #Amount of time that has to pass for the plugin to send an alert when someone is suspected of xray
  alert-interval: "2m"
  #Text of the teleport button for the automatic alert message
  tp-button-text: "&a[CLICK TO TP]"

  # How it works:
  # Suspect status: {suspect_status} this line tells you if the minimum requirements were met
  # The conditions are:
  #  - Enough amount of blocks broken(amount-of-blocks in config.yml)
  #  - Percentage higher than alert-threshold

notes:
  #This will alert all players with apexstaff.admin permission when a player with notes does something
  alert-for-noted-players:
    #Enable the feature
    enabled: true
    #Alert when a noted player joins
    alert-on-join: true
    #Alert when a noted player quits
    alert-on-quit: true
    #Alert when a noted player is suspected of xray, the alert cooldown for this specific alert is handled by the xray check alert cooldown
    alert-on-xray-suspicion: true
    #Alert when an alt account of a noted player joins
    alert-on-alt-join: true
    #Alert when an alt account of a noted player quits
    alert-on-alt-quit: true
    #Minimum amount of notes that a player has to have to get alerted
    min-notes-threshold: 1
    #Alert cooldown for  all alerts except xray one
    alert-cooldown: "60s"

